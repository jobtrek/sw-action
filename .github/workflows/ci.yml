name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Container Image
    runs-on: ubuntu-latest

    # Run a local registry to push to
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000

    env:
      TEST_TAG: localhost:5001/actions/container-prebuilt-action:latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Docker BuildX
        id: setup-buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver-opts: network=host

      - name: Build the Container
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Pull tests
        id: tests
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: jobtrek/sw
          ref: v1.0.3

      - name: Run the Container
        id: run
        env:
          INPUT_PATH: 'test/test'
          INPUT_LANG: 'rs,js,ts,java,php'
        run: |
          docker run \
            --volume ${{ github.workspace }}:/github/workspace \
            --env INPUT_PATH="$INPUT_PATH" \
            --env INPUT_LANG="$INPUT_LANG" \
            --rm \
            ${{ env.TEST_TAG }}

      - name: Test if the test passed
        id: check
        run: |
          tree test
          if diff -rq test/test test/expected; then
            echo "Test passed"
          else
            echo "Test failed"
            diff -r test/test test/expected
            exit 1
          fi
